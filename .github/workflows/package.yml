name: Package plugin

on:
  push:
    branches: [master]
  workflow_dispatch:

env:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install maturin
        run: pip install maturin

      - name: Build native module
        shell: pwsh
        working-directory: woof_native
        run: maturin build --release --out dist

      - name: Extract native binary
        shell: pwsh
        run: |
          $wheel = Get-ChildItem -Path woof_native/dist -Filter "*.whl" | Select-Object -First 1
          if (-not $wheel) { throw "No wheel found at woof_native/dist" }
          Write-Host "Found wheel: $($wheel.Name)"
          $tmp = Join-Path $env:RUNNER_TEMP "wheel_extract"
          New-Item -ItemType Directory -Path $tmp -Force | Out-Null
          python -c "import zipfile, sys; zipfile.ZipFile(sys.argv[1]).extractall(sys.argv[2])" $wheel.FullName $tmp
          Write-Host "Wheel extracted to $tmp"
          Get-ChildItem -Path $tmp -Recurse | Select-Object FullName | Write-Host
          $native = Get-ChildItem -Path $tmp -Include "*_native_impl*" -Recurse | Select-Object -First 1
          if (-not $native) {
            $native = Get-ChildItem -Path $tmp -Include "*.so", "*.pyd", "*.dylib" -Recurse | Select-Object -First 1
          }
          if (-not $native) { throw "Native binary not found in wheel" }
          Write-Host "Found native binary: $($native.Name)"
          New-Item -ItemType Directory -Path dock_export/_woof_native -Force | Out-Null
          Copy-Item -Path $native.FullName -Destination "dock_export/_woof_native/$($native.Name)" -Force

      - name: Package plugin
        shell: pwsh
        run: Compress-Archive -Path dock_export -DestinationPath "dock_export-${{ matrix.os }}.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: dock_export_${{ matrix.os }}
          path: dock_export-${{ matrix.os }}.zip

  release:
    needs: build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-tags: true

      - name: Read version from metadata.txt
        id: metadata
        shell: pwsh
        run: |
          $content = Get-Content -Path dock_export/metadata.txt
          $version = ($content | Select-String '^version=(.+)').Matches.Groups[1].Value
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: dock_export_*
          merge-multiple: true

      - name: List artifacts
        shell: pwsh
        run: Get-ChildItem -Filter "*.zip"

      - name: Create tag if new version
        id: tag
        shell: pwsh
        run: |
          $tag = "v${{ steps.metadata.outputs.version }}"
          $remote = git ls-remote --tags origin "refs/tags/$tag"
          if ($remote) {
            "created=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "Tag $tag already exists on remote, skipping"
          } else {
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a $tag -m "Release $tag"
            git push origin $tag
            "created=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Create release
        if: steps.tag.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $artifacts = Get-ChildItem -Filter "*.zip" | ForEach-Object { $_.FullName }
          gh release create "v${{ steps.metadata.outputs.version }}" `
            --title "Dock Export v${{ steps.metadata.outputs.version }}" `
            --generate-notes `
            $artifacts
